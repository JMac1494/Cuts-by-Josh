<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuts by Josh — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--cream:#fff4ea;--black:#111;--muted:#7a6c60;--border:rgba(0,0,0,0.1);--success-bg:#e8f5ee;--success:#2d6a4f;}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--black);min-height:100vh;}

/* Header */
.header{background:var(--black);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;}
.logo-area{display:flex;align-items:center;gap:11px;}
.logo-img{width:38px;height:38px;border-radius:50%;object-fit:cover;}
.logo-text{font-family:'Playfair Display',serif;font-size:18px;color:#fff4ea;}
.logo-sub{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,244,234,0.4);margin-top:2px;}
.header-right{display:flex;align-items:center;gap:10px;}
.admin-badge{background:rgba(255,244,234,0.12);border:1px solid rgba(255,244,234,0.2);color:rgba(255,244,234,0.6);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:4px 10px;border-radius:4px;}
.logout-btn{background:none;border:1px solid rgba(255,244,234,0.2);color:rgba(255,244,234,0.5);font-family:'DM Sans',sans-serif;font-size:11px;padding:5px 12px;border-radius:4px;cursor:pointer;}
.logout-btn:hover{color:#fff4ea;border-color:rgba(255,244,234,0.4);}

/* Login screen */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--cream);}
.login-box{background:white;border:1px solid var(--border);border-radius:14px;padding:2rem;width:320px;}
.login-logo{text-align:center;margin-bottom:1.5rem;}
.login-logo img{width:54px;height:54px;border-radius:50%;margin-bottom:0.6rem;}
.login-title{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:3px;}
.login-sub{font-size:11px;color:var(--muted);}
.form-group{margin-bottom:0.9rem;}
.form-label{font-size:10px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px;}
.form-input{width:100%;background:var(--cream);border:1.5px solid var(--border);border-radius:7px;padding:0.58rem 0.82rem;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--black);outline:none;transition:border-color 0.11s;}
.form-input:focus{border-color:var(--black);}
.login-error{font-size:11px;color:#a01010;margin-bottom:0.8rem;display:none;}
.btn-full{width:100%;background:var(--black);color:#fff4ea;border:none;border-radius:8px;padding:0.8rem;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:opacity 0.14s;margin-top:0.3rem;}
.btn-full:hover{opacity:0.82;}

/* Nav */
.admin-nav{display:flex;border-bottom:1px solid var(--border);background:white;overflow-x:auto;}
.admin-tab{padding:0.8rem 1.1rem;font-size:11px;font-weight:400;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.11s;}
.admin-tab:hover{color:var(--black);}
.admin-tab.active{color:var(--black);border-bottom-color:var(--black);font-weight:500;}
.admin-content{padding:1.4rem;max-width:900px;margin:0 auto;}

/* Dashboard */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:1.4rem;}
.dash-card{background:white;border:1px solid var(--border);border-radius:10px;padding:1rem;}
.dash-num{font-family:'Playfair Display',serif;font-size:24px;font-weight:500;margin-bottom:2px;}
.dash-label{font-size:9px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;color:var(--muted);}
.dash-sub{font-size:10px;color:var(--success);margin-top:3px;}
.chart-wrap{background:white;border:1px solid var(--border);border-radius:10px;padding:1.1rem;margin-bottom:1rem;}
.chart-title{font-size:10px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:100px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bar{width:100%;background:var(--black);border-radius:3px 3px 0 0;}
.bar-lbl{font-size:9px;color:var(--muted);text-align:center;}
.bar-val{font-size:9px;font-weight:500;}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:1rem;}
.donut-wrap{background:white;border:1px solid var(--border);border-radius:10px;padding:1rem;}
.donut-inner{display:flex;align-items:center;gap:10px;}
.legend-row{display:flex;align-items:center;gap:6px;font-size:10px;margin-bottom:5px;}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.legend-pct{margin-left:auto;font-weight:500;font-size:10px;}
.loyalty-alert{background:#fff8e1;border:1px solid #f0d060;border-radius:8px;padding:0.8rem 1rem;margin-bottom:0.9rem;}
.loyalty-alert-title{font-weight:500;font-size:12px;margin-bottom:3px;color:#7a5c00;}
.loyalty-alert-sub{color:#92660a;font-size:11px;}
.section-label{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:0.85rem;}

/* Bookings */
.table-wrap{background:white;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.table-header{display:flex;justify-content:space-between;align-items:center;padding:0.9rem 1.1rem;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap;}
.table-title{font-size:10px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;color:var(--muted);}
.t-search{background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-family:'DM Sans',sans-serif;font-size:11px;width:180px;outline:none;}
.booking-row{display:grid;grid-template-columns:1.4fr 1fr 0.8fr 0.7fr 0.6fr 0.7fr;gap:6px;padding:0.7rem 1.1rem;border-bottom:1px solid rgba(0,0,0,0.05);font-size:11px;align-items:center;}
.booking-row.head{font-size:9px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);background:rgba(0,0,0,0.02);}
.status-pill{font-size:10px;font-weight:500;padding:2px 7px;border-radius:9px;display:inline-block;}
.status-pill.confirmed{background:var(--success-bg);color:var(--success);}
.status-pill.upcoming{background:#fff8e1;color:#92660a;}
.status-pill.cancelled{background:#fde8e8;color:#a01010;}
.action-btns{display:flex;gap:4px;}
.btn-xs{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-family:'DM Sans',sans-serif;font-size:10px;cursor:pointer;color:var(--muted);white-space:nowrap;}
.btn-xs:hover{border-color:var(--black);color:var(--black);}
.btn-xs.danger:hover{border-color:#a01010;color:#a01010;}
.noshow-warn{font-size:9px;color:#a01010;font-weight:500;margin-top:2px;}

/* Availability calendar */
.avail-cal-legend{display:flex;gap:14px;margin-bottom:1rem;flex-wrap:wrap;}
.avail-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.avail-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.85rem;}
.month-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:500;}
.nav-btn{background:none;border:1px solid var(--border);border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:13px;color:var(--black);}
.nav-btn:hover{background:white;}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:1.4rem;}
.day-label{text-align:center;font-size:9px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);padding-bottom:4px;}
.avail-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;font-size:11px;cursor:pointer;border:1.5px solid transparent;transition:all 0.14s;gap:2px;}
.avail-day.empty{background:none;cursor:default;}
.avail-day.closed-day{background:rgba(0,0,0,0.03);color:rgba(0,0,0,0.2);cursor:not-allowed;}
.avail-day.past{color:rgba(0,0,0,0.16);cursor:default;background:none;}
.avail-day.blocked{background:#fde8e8;color:#a01010;border-color:rgba(160,16,16,0.18);}
.avail-day.has-appts{background:#fff8e1;color:#7a5c00;border-color:rgba(146,102,10,0.18);}
.avail-day.free{background:white;}
.avail-day.free:hover{background:#fde8e8;border-color:rgba(160,16,16,0.25);}
.appt-dot{width:4px;height:4px;border-radius:50%;background:#92660a;}

/* Hours */
.hours-grid{display:flex;flex-direction:column;gap:7px;margin-bottom:1.3rem;}
.hours-row{background:white;border:1px solid var(--border);border-radius:8px;padding:0.65rem 1rem;display:flex;align-items:center;gap:12px;font-size:12px;}
.hours-day{font-weight:500;width:82px;flex-shrink:0;}
.hours-toggle{width:34px;height:18px;background:rgba(0,0,0,0.1);border-radius:9px;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0;}
.hours-toggle.on{background:var(--black);}
.hours-toggle::after{content:'';width:12px;height:12px;background:white;border-radius:50%;position:absolute;top:3px;left:3px;transition:left 0.2s;}
.hours-toggle.on::after{left:19px;}
.hours-selects{display:flex;align-items:center;gap:7px;margin-left:auto;}
.hours-select{background:var(--cream);border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--black);outline:none;}
.hours-select:disabled{opacity:0.35;cursor:not-allowed;}

/* Services */
.svc-list{display:flex;flex-direction:column;gap:7px;margin-bottom:0.9rem;}
.svc-row{background:white;border:1px solid var(--border);border-radius:8px;padding:0.7rem 1rem;display:grid;grid-template-columns:1.6fr 0.7fr 0.6fr 0.5fr;gap:8px;align-items:center;font-size:11px;}
.svc-row.head{font-size:9px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);background:rgba(0,0,0,0.02);}
.editable{background:var(--cream);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-family:'DM Sans',sans-serif;font-size:11px;width:100%;color:var(--black);outline:none;}
.editable:focus{border-color:var(--black);}
.btn-blk{background:var(--black);color:#fff4ea;border:none;border-radius:6px;padding:4px 10px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;}
.btn-blk:hover{opacity:0.82;}
.btn-blk.full{width:100%;padding:0.75rem;font-size:12px;border-radius:8px;margin-top:0.4rem;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.42);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;}
.modal-box{background:var(--cream);border-radius:12px;padding:1.4rem;width:340px;max-width:100%;}
.modal-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:500;margin-bottom:4px;}
.modal-sub{font-size:11px;color:var(--muted);margin-bottom:1.1rem;line-height:1.5;}
.modal-actions{display:flex;gap:8px;margin-top:1rem;}
.modal-day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:0.8rem;}
.modal-day-lbl{text-align:center;font-size:8px;color:var(--muted);padding-bottom:3px;text-transform:uppercase;}
.modal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:10px;cursor:pointer;background:white;border:1px solid transparent;}
.modal-day:hover:not(.md-empty):not(.md-past):not(.md-unavail){border-color:rgba(0,0,0,0.2);}
.modal-day.md-empty{background:none;cursor:default;}
.modal-day.md-past{color:rgba(0,0,0,0.16);cursor:default;background:none;}
.modal-day.md-unavail{color:rgba(0,0,0,0.2);cursor:not-allowed;background:rgba(0,0,0,0.02);}
.modal-day.md-sel{background:var(--black);color:#fff4ea;}
.modal-day.md-avail{position:relative;}
.modal-day.md-avail::after{content:'';width:3px;height:3px;border-radius:50%;background:var(--success);position:absolute;bottom:2px;left:50%;transform:translateX(-50%);}
.modal-times{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:0.8rem;}
.modal-time{background:white;border:1px solid var(--border);border-radius:5px;padding:4px;text-align:center;font-size:10px;cursor:pointer;}
.modal-time:hover{border-color:rgba(0,0,0,0.25);}
.modal-time.mt-sel{background:var(--black);color:#fff4ea;border-color:var(--black);}
.btn-modal{flex:1;background:var(--black);color:#fff4ea;border:none;border-radius:7px;padding:0.6rem;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;}
.btn-modal:hover{opacity:0.82;}
.btn-modal:disabled{opacity:0.3;cursor:not-allowed;}
.btn-modal.secondary{background:white;color:var(--black);border:1px solid var(--border);}
.btn-modal.secondary:hover{border-color:rgba(0,0,0,0.3);}

@media(max-width:600px){
  .dash-grid{grid-template-columns:1fr 1fr;}
  .booking-row{grid-template-columns:1fr 1fr;font-size:10px;}
  .svc-row{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <img src="CBJ_Logo.png" alt="Cuts by Josh" onerror="this.style.display='none'">
        <div class="login-title">Cuts by Josh</div>
        <div class="login-sub">Admin panel — sign in to continue</div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="login-pw" placeholder="Enter your admin password">
      </div>
      <div class="login-error" id="login-err">Incorrect password. Try again.</div>
      <button class="btn-full" id="login-btn">Sign in</button>
      <div style="margin-top:1rem;font-size:10px;color:var(--muted);text-align:center;">Default password: <code>josh2024</code> — change this before going live</div>
    </div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="admin-app" style="display:none;">
  <div class="header">
    <div class="logo-area">
      <img class="logo-img" src="CBJ_Logo.png" alt="Cuts by Josh" onerror="this.style.display='none'">
      <div>
        <div class="logo-text">Cuts by Josh</div>
        <div class="logo-sub">Admin Panel</div>
      </div>
    </div>
    <div class="header-right">
      <div class="admin-badge">Admin</div>
      <button class="logout-btn" id="logout-btn">Sign out</button>
    </div>
  </div>

  <div class="admin-nav" id="admin-nav">
    <div class="admin-tab active" data-tab="dashboard">Dashboard</div>
    <div class="admin-tab" data-tab="bookings">Bookings</div>
    <div class="admin-tab" data-tab="availability">Availability</div>
    <div class="admin-tab" data-tab="services">Services & Pricing</div>
  </div>

  <div class="admin-content" id="admin-content"></div>
</div>

<!-- RESCHEDULE MODAL -->
<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
// ─── DATA ───
// In production these arrays come from your Supabase database via API calls.
// For now they are stored in memory (reset on page refresh).
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_NAMES={0:'Sunday',1:'Monday',2:'Tuesday',3:'Wednesday',4:'Thursday',5:'Friday',6:'Saturday'};
const ALL_SLOTS=['9:00 am','9:30 am','10:00 am','10:30 am','11:00 am','11:30 am','12:00 pm','12:30 pm','2:00 pm','2:30 pm','3:00 pm','3:30 pm','4:00 pm','4:30 pm','5:00 pm'];
const HOURS=[];
for(let h=7;h<=20;h++){HOURS.push((h<10?'0':'')+h+':00');if(h<20)HOURS.push((h<10?'0':'')+h+':30');}

const ADMIN_PASSWORD='josh2024'; // Change this! In production use a proper auth service.

let services=[
  {id:'classic',name:'Classic Cut',duration:'30 min',price:'£18'},
  {id:'fade',name:'Skin Fade',duration:'45 min',price:'£22'},
  {id:'beard',name:'Beard Trim',duration:'20 min',price:'£12'},
  {id:'combo',name:'Cut & Beard',duration:'60 min',price:'£30'},
  {id:'fadebeard',name:'Skin Fade & Beard Trim',duration:'60 min',price:'£32'},
  {id:'kids',name:'Kids Cut',duration:'25 min',price:'£14'},
  {id:'student',name:'Students 11–18',duration:'30 min',price:'£15'},
  {id:'senior',name:'Senior Citizens 60+',duration:'30 min',price:'£15'},
];

let availability={
  0:{open:false,start:'09:00',end:'17:00'},
  1:{open:true,start:'09:00',end:'17:30'},
  2:{open:true,start:'09:00',end:'17:30'},
  3:{open:true,start:'09:00',end:'17:30'},
  4:{open:true,start:'09:00',end:'17:30'},
  5:{open:true,start:'09:00',end:'17:30'},
  6:{open:true,start:'09:00',end:'15:00'},
};

let blockedDates=[];

let bookings=[
  {id:1,name:'Marcus Bell',service:'Skin Fade',date:'2026-05-08',time:'10:00 am',price:'£22',email:'marcus@email.com',phone:'+44 7700 111222',status:'upcoming',visits:3},
  {id:2,name:'Liam Carter',service:'Classic Cut',date:'2026-05-07',time:'11:30 am',price:'£18',email:'liam@email.com',phone:'+44 7700 333444',status:'upcoming',visits:5},
  {id:3,name:'Theo Wright',service:'Cut & Beard',date:'2026-05-06',time:'9:00 am',price:'£30',email:'theo@email.com',phone:'+44 7700 555666',status:'confirmed',visits:10},
  {id:4,name:'Sam Hughes',service:'Beard Trim',date:'2026-05-05',time:'2:30 pm',price:'£12',email:'sam@email.com',phone:'+44 7700 777888',status:'confirmed',visits:2},
  {id:5,name:'Archie Stone',service:'Skin Fade & Beard Trim',date:'2026-05-10',time:'3:00 pm',price:'£32',email:'archie@email.com',phone:'+44 7700 999000',status:'upcoming',visits:15},
];

let noShows={};
bookings.forEach(b=>{noShows[b.name]=noShows[b.name]||0;});

let adminTab='dashboard';
let filterQ='';
let viewMonth=new Date();viewMonth.setDate(1);viewMonth.setHours(0,0,0,0);
let modalReschedule={booking:null,date:null,time:null};

// ─── AUTH ───
function today(){const d=new Date();d.setHours(0,0,0,0);return d;}
function dateKey(d){return d instanceof Date?d.toISOString().slice(0,10):d;}

document.getElementById('login-btn').addEventListener('click',doLogin);
document.getElementById('login-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('logout-btn').addEventListener('click',()=>{
  sessionStorage.removeItem('cbj_admin');
  document.getElementById('admin-app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-pw').value='';
});

function doLogin(){
  const pw=document.getElementById('login-pw').value;
  if(pw===ADMIN_PASSWORD){
    sessionStorage.setItem('cbj_admin','1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-app').style.display='block';
    renderTab();
  } else {
    document.getElementById('login-err').style.display='block';
  }
}

if(sessionStorage.getItem('cbj_admin')==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-app').style.display='block';
}

// ─── NAV ───
document.getElementById('admin-nav').addEventListener('click',e=>{
  const t=e.target.closest('[data-tab]');
  if(!t)return;
  adminTab=t.dataset.tab;
  document.querySelectorAll('.admin-tab').forEach(el=>el.classList.remove('active'));
  t.classList.add('active');
  renderTab();
});

function renderTab(){
  const c=document.getElementById('admin-content');
  if(adminTab==='dashboard')c.innerHTML=tabDashboard();
  else if(adminTab==='bookings')c.innerHTML=tabBookings();
  else if(adminTab==='availability')c.innerHTML=tabAvailability();
  else if(adminTab==='services')c.innerHTML=tabServices();
  attachTabHandlers();
}

// ─── SLOTS ───
function slotsForDate(d){
  const key=typeof d==='string'?d:dateKey(d);
  const dt=typeof d==='string'?new Date(d+'T12:00:00'):d;
  const av=availability[dt.getDay()];
  if(!av||!av.open||blockedDates.includes(key))return[];
  const taken=bookings.filter(b=>b.date===key&&b.status!=='cancelled').map(b=>b.time);
  return ALL_SLOTS.filter(s=>!taken.includes(s));
}

function bookingsOn(key){return bookings.filter(b=>b.date===key&&b.status!=='cancelled');}

// ─── DASHBOARD ───
function tabDashboard(){
  const total=bookings.length;
  const upcoming=bookings.filter(b=>b.status==='upcoming').length;
  const rev=bookings.reduce((a,b)=>{const n=parseInt(b.price.replace('£',''));return a+(isNaN(n)?0:n);},0);
  const nsTotal=Object.values(noShows).reduce((a,b)=>a+b,0);
  const weekData=[3,5,4,7,6,8,5];
  const weekMax=Math.max(...weekData);
  const wk=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const svcCount={};bookings.forEach(b=>{svcCount[b.service]=(svcCount[b.service]||0)+1;});
  const svcEntries=Object.entries(svcCount);
  const svcTotal=svcEntries.reduce((a,b)=>a+b[1],0);
  const colors=['#111','#b8940a','#2d6a4f','#7a6c60','#c0392b','#2980b9','#8e44ad','#16a085'];
  const milestones=bookings.filter(b=>b.visits>0&&b.visits%5===0);
  return `
  ${milestones.length?`<div class="loyalty-alert"><div class="loyalty-alert-title">✂ Loyalty milestone${milestones.length>1?'s':''} — notification</div>${milestones.map(b=>`<div class="loyalty-alert-sub">${b.name} has reached ${b.visits} visits. Consider a thank-you gesture!</div>`).join('')}</div>`:''}
  <div class="dash-grid">
    <div class="dash-card"><div class="dash-num">${total}</div><div class="dash-label">Total bookings</div><div class="dash-sub">All time</div></div>
    <div class="dash-card"><div class="dash-num">${upcoming}</div><div class="dash-label">Upcoming</div></div>
    <div class="dash-card"><div class="dash-num">£${rev}</div><div class="dash-label">Revenue</div><div class="dash-sub">All time</div></div>
    <div class="dash-card"><div class="dash-num">${nsTotal}</div><div class="dash-label">No-shows</div></div>
  </div>
  <div class="chart-wrap">
    <div class="chart-title">Cuts this week (Mon–Sun)</div>
    <div class="bar-chart">${weekData.map((v,i)=>`<div class="bar-col"><div class="bar-val">${v}</div><div class="bar" style="height:${Math.round(v/weekMax*82)}px;"></div><div class="bar-lbl">${wk[i]}</div></div>`).join('')}</div>
  </div>
  <div class="charts-row">
    <div class="donut-wrap">
      <div class="chart-title">Cut types</div>
      <div class="donut-inner">
        <svg width="68" height="68" viewBox="0 0 68 68" style="flex-shrink:0;">
          ${(()=>{let off=0;return svcEntries.map(([n,c],i)=>{const p=c/svcTotal,dash=p*164.9;const seg=`<circle cx="34" cy="34" r="26.25" fill="none" stroke="${colors[i%colors.length]}" stroke-width="12" stroke-dasharray="${dash.toFixed(1)} ${(164.9-dash).toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}" transform="rotate(-90 34 34)"/>`;off+=dash;return seg;}).join('');})()}
        </svg>
        <div style="flex:1;">${svcEntries.map(([n,c],i)=>`<div class="legend-row"><div class="legend-dot" style="background:${colors[i%colors.length]};"></div><span style="color:var(--muted);font-size:10px;">${n}</span><span class="legend-pct">${Math.round(c/svcTotal*100)}%</span></div>`).join('')}</div>
      </div>
    </div>
    <div class="donut-wrap">
      <div class="chart-title">Revenue by service</div>
      ${svcEntries.map(([n,c],i)=>{const svc=services.find(s=>s.name===n);const p=svc?parseInt(svc.price.replace('£','')):0;return `<div class="legend-row"><div class="legend-dot" style="background:${colors[i%colors.length]};"></div><span style="color:var(--muted);font-size:10px;">${n}</span><span class="legend-pct">£${p*c}</span></div>`;}).join('')}
    </div>
  </div>`;
}

// ─── BOOKINGS ───
function tabBookings(){
  const filtered=filterQ?bookings.filter(b=>b.name.toLowerCase().includes(filterQ.toLowerCase())||b.service.toLowerCase().includes(filterQ.toLowerCase())):bookings;
  return `<div class="table-wrap">
    <div class="table-header">
      <span class="table-title">All bookings (${filtered.length})</span>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input class="t-search" id="bk-search" placeholder="Search name or service…" value="${filterQ}">
        <button class="btn-blk" style="padding:5px 12px;font-size:11px;" id="export-btn">Export CSV</button>
      </div>
    </div>
    <div class="booking-row head"><span>Client</span><span>Service</span><span>Date</span><span>Time</span><span>Status</span><span>Actions</span></div>
    ${filtered.map(b=>`<div class="booking-row" data-id="${b.id}">
      <span>
        <div style="font-weight:500;">${b.name}</div>
        <div style="font-size:10px;color:var(--muted);">${b.phone}</div>
        <div style="font-size:10px;color:var(--muted);">${b.email}</div>
        ${(noShows[b.name]||0)>1?`<div class="noshow-warn">⚠ ${noShows[b.name]} no-shows</div>`:''}
      </span>
      <span>${b.service}</span>
      <span>${b.date}</span>
      <span>${b.time}</span>
      <span><span class="status-pill ${b.status}">${b.status}</span></span>
      <span class="action-btns">
        <button class="btn-xs" data-reschedule="${b.id}">Reschedule</button>
        ${b.status!=='cancelled'?`<button class="btn-xs danger" data-cancel="${b.id}">Cancel</button>`:''}
        <button class="btn-xs" data-noshow="${b.id}">No-show</button>
      </span>
    </div>`).join('')}
  </div>`;
}

// ─── AVAILABILITY ───
function tabAvailability(){
  const year=viewMonth.getFullYear(),month=viewMonth.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayD=today();
  let cells='';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{cells+=`<div class="day-label">${d}</div>`;});
  for(let i=0;i<firstDay;i++)cells+=`<div class="avail-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(year,month,d);
    const key=dateKey(dt);
    const isPast=dt<todayD;
    const isBlocked=blockedDates.includes(key);
    const isClosed=!availability[dt.getDay()]?.open;
    const appts=bookingsOn(key);
    let cls='avail-day';
    let dot='';
    if(isPast)cls+=' past';
    else if(isClosed)cls+=' closed-day';
    else if(isBlocked)cls+=' blocked';
    else if(appts.length>0){cls+=' has-appts';dot=`<div class="appt-dot"></div>`;}
    else cls+=' free';
    const click=!isPast&&!isClosed?` data-adate="${key}"`:'';
    cells+=`<div class="${cls}"${click}>${d}${dot}</div>`;
  }
  return `
  <div class="avail-cal-legend">
    <div class="avail-legend-item"><div class="avail-legend-dot" style="background:white;border:1px solid #ccc;"></div>Available (click to block)</div>
    <div class="avail-legend-item"><div class="avail-legend-dot" style="background:#fde8e8;"></div>Blocked (click to unblock)</div>
    <div class="avail-legend-item"><div class="avail-legend-dot" style="background:#fff8e1;"></div>Has appointments (click to reschedule)</div>
    <div class="avail-legend-item"><div class="avail-legend-dot" style="background:rgba(0,0,0,0.06);"></div>Closed day</div>
  </div>
  <div class="cal-header">
    <button class="nav-btn" id="prev-mo">&#8249;</button>
    <div class="month-title">${MONTHS[month]} ${year}</div>
    <button class="nav-btn" id="next-mo">&#8250;</button>
  </div>
  <div class="day-grid">${cells}</div>
  <div class="section-label">Working hours per day</div>
  <div class="hours-grid">${[1,2,3,4,5,6,0].map(d=>`
    <div class="hours-row">
      <div class="hours-day">${DAY_NAMES[d]}</div>
      <div class="hours-toggle${availability[d].open?' on':''}" data-htoggle="${d}" title="Toggle open/closed"></div>
      <div class="hours-selects">
        <select class="hours-select" data-hstart="${d}" ${availability[d].open?'':'disabled'}>
          ${HOURS.map(h=>`<option value="${h}" ${availability[d].start===h?'selected':''}>${h}</option>`).join('')}
        </select>
        <span style="font-size:11px;color:var(--muted);">to</span>
        <select class="hours-select" data-hend="${d}" ${availability[d].open?'':'disabled'}>
          ${HOURS.map(h=>`<option value="${h}" ${availability[d].end===h?'selected':''}>${h}</option>`).join('')}
        </select>
      </div>
    </div>`).join('')}
  </div>`;
}

// ─── SERVICES ───
function tabServices(){
  return `<div class="section-label">Edit services & pricing</div>
  <div class="svc-list">
    <div class="svc-row head"><span>Name</span><span>Duration</span><span>Price</span><span></span></div>
    ${services.map((s,i)=>`<div class="svc-row">
      <input class="editable" data-field="name" data-idx="${i}" value="${s.name}">
      <input class="editable" data-field="duration" data-idx="${i}" value="${s.duration}">
      <input class="editable" data-field="price" data-idx="${i}" value="${s.price}">
      <button class="btn-blk" data-del="${i}" style="font-size:10px;padding:3px 8px;">Remove</button>
    </div>`).join('')}
  </div>
  <button class="btn-blk full" id="add-svc-btn">+ Add service</button>`;
}

// ─── MODAL ───
function openRescheduleModal(bk){
  modalReschedule={booking:bk,date:null,time:null};
  const year=viewMonth.getFullYear(),month=viewMonth.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayD=today();
  let cells='';
  ['S','M','T','W','T','F','S'].forEach(d=>{cells+=`<div class="modal-day-lbl">${d}</div>`;});
  for(let i=0;i<firstDay;i++)cells+=`<div class="modal-day md-empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(year,month,d);
    const key=dateKey(dt);
    const isPast=dt<todayD;
    const slots=slotsForDate(dt);
    const unavail=!availability[dt.getDay()]?.open||slots.length===0||blockedDates.includes(key);
    let cls='modal-day';
    if(isPast)cls+=' md-past';
    else if(unavail)cls+=' md-unavail';
    else cls+=' md-avail';
    cells+=`<div class="${cls}"${!isPast&&!unavail?` data-mdate="${key}"`:''}>${d}</div>`;
  }
  document.getElementById('modal-box').innerHTML=`
    <div class="modal-title">Reschedule appointment</div>
    <div class="modal-sub">${bk.name} — ${bk.service}<br>Currently: ${bk.date} at ${bk.time}</div>
    <div style="font-size:10px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Pick new date</div>
    <div class="modal-day-grid">${cells}</div>
    <div id="modal-times-wrap"></div>
    <div class="modal-actions">
      <button class="btn-modal" id="confirm-reschedule" disabled>Confirm</button>
      <button class="btn-modal secondary" id="close-modal">Cancel</button>
    </div>`;
  document.getElementById('modal').style.display='flex';
  attachModalHandlers();
}

function attachModalHandlers(){
  document.querySelectorAll('[data-mdate]').forEach(el=>{
    el.addEventListener('click',()=>{
      modalReschedule.date=el.dataset.mdate;
      modalReschedule.time=null;
      document.querySelectorAll('[data-mdate]').forEach(e=>e.classList.remove('md-sel'));
      el.classList.add('md-sel');
      const slots=slotsForDate(modalReschedule.date);
      document.getElementById('modal-times-wrap').innerHTML=
        `<div style="font-size:10px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;margin-top:8px;">Pick new time</div>
         <div class="modal-times">${slots.map(t=>`<div class="modal-time" data-mtime="${t}">${t}</div>`).join('')}</div>`;
      document.getElementById('confirm-reschedule').disabled=true;
      document.querySelectorAll('[data-mtime]').forEach(te=>{
        te.addEventListener('click',()=>{
          modalReschedule.time=te.dataset.mtime;
          document.querySelectorAll('[data-mtime]').forEach(x=>x.classList.remove('mt-sel'));
          te.classList.add('mt-sel');
          document.getElementById('confirm-reschedule').disabled=false;
        });
      });
    });
  });
  document.getElementById('confirm-reschedule').addEventListener('click',()=>{
    const bk=bookings.find(b=>b.id===modalReschedule.booking.id);
    if(bk){bk.date=modalReschedule.date;bk.time=modalReschedule.time;}
    closeModal();renderTab();
  });
  document.getElementById('close-modal').addEventListener('click',closeModal);
}

function closeModal(){document.getElementById('modal').style.display='none';}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

// ─── TAB HANDLERS ───
function attachTabHandlers(){
  if(adminTab==='bookings'){
    const s=document.getElementById('bk-search');
    if(s)s.addEventListener('input',e=>{filterQ=e.target.value;renderTab();});
    document.querySelectorAll('[data-reschedule]').forEach(el=>{
      el.addEventListener('click',()=>{
        const bk=bookings.find(b=>b.id===+el.dataset.reschedule);
        if(bk)openRescheduleModal(bk);
      });
    });
    document.querySelectorAll('[data-cancel]').forEach(el=>{
      el.addEventListener('click',()=>{
        if(confirm('Cancel this booking?')){
          const bk=bookings.find(b=>b.id===+el.dataset.cancel);
          if(bk)bk.status='cancelled';
          renderTab();
        }
      });
    });
    document.querySelectorAll('[data-noshow]').forEach(el=>{
      el.addEventListener('click',()=>{
        const bk=bookings.find(b=>b.id===+el.dataset.noshow);
        if(bk){
          noShows[bk.name]=(noShows[bk.name]||0)+1;
          bk.status='cancelled';
          const ns=noShows[bk.name];
          if(ns>=2)alert(`⚠ Warning: ${bk.name} has ${ns} no-shows. Consider refusing future bookings.`);
          renderTab();
        }
      });
    });
    const exp=document.getElementById('export-btn');
    if(exp)exp.addEventListener('click',()=>{
      const rows=[['Name','Service','Date','Time','Price','Status','Email','Phone'],...bookings.map(b=>[b.name,b.service,b.date,b.time,b.price,b.status,b.email,b.phone])];
      const csv=rows.map(r=>r.join(',')).join('\n');
      const a=document.createElement('a');a.href='data:text/csv,'+encodeURIComponent(csv);a.download='cbj_bookings.csv';a.click();
    });
  }

  if(adminTab==='availability'){
    document.querySelectorAll('[data-adate]').forEach(el=>{
      el.addEventListener('click',()=>{
        const key=el.dataset.adate;
        const appts=bookingsOn(key);
        if(appts.length>0){
          openRescheduleModal(appts[0]);
        } else {
          if(blockedDates.includes(key))blockedDates=blockedDates.filter(x=>x!==key);
          else blockedDates.push(key);
          renderTab();
        }
      });
    });
    const pm=document.getElementById('prev-mo');if(pm)pm.addEventListener('click',()=>{viewMonth.setMonth(viewMonth.getMonth()-1);renderTab();});
    const nm=document.getElementById('next-mo');if(nm)nm.addEventListener('click',()=>{viewMonth.setMonth(viewMonth.getMonth()+1);renderTab();});
    document.querySelectorAll('[data-htoggle]').forEach(el=>{
      el.addEventListener('click',()=>{const d=+el.dataset.htoggle;availability[d].open=!availability[d].open;renderTab();});
    });
    document.querySelectorAll('[data-hstart]').forEach(el=>{el.addEventListener('change',e=>{availability[+el.dataset.hstart].start=e.target.value;});});
    document.querySelectorAll('[data-hend]').forEach(el=>{el.addEventListener('change',e=>{availability[+el.dataset.hend].end=e.target.value;});});
  }

  if(adminTab==='services'){
    document.querySelectorAll('[data-field]').forEach(el=>{el.addEventListener('change',e=>{services[+el.dataset.idx][el.dataset.field]=e.target.value;});});
    document.querySelectorAll('[data-del]').forEach(el=>{el.addEventListener('click',()=>{if(confirm('Remove this service?')){services.splice(+el.dataset.del,1);renderTab();}});});
    const a=document.getElementById('add-svc-btn');if(a)a.addEventListener('click',()=>{services.push({id:'s'+Date.now(),name:'New Service',duration:'30 min',price:'£0'});renderTab();});
  }
}

// ─── INIT ───
if(sessionStorage.getItem('cbj_admin')==='1')renderTab();
</script>
</body>
